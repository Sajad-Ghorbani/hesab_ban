name: hesab_ban
description: The accounting Hesab Ban application is suitable for people who do not have access to a computer or laptop and can invoice, check and check the customer's account with a mobile phone.

publish_to: 'none'

version: 1.4.2+1014

environment:
  sdk: ">=2.16.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.1
  persian_number_utility: ^1.1.1
  hive: ^2.1.0
  hive_flutter: 1.1.0
  lottie: ^1.2.1
  cached_network_image: ^3.2.0
  animations: ^2.0.2
  persistent_bottom_nav_bar: ^4.0.2
  font_awesome_flutter: ^9.2.0
  sliver_tools: ^0.2.5
  persian_datetime_picker: ^2.4.0
  flip_card: ^0.6.0
  url_launcher: ^6.0.11
  currency_text_input_formatter: ^2.1.5
  pdf: ^3.7.3
  printing: ^5.7.4
  image_picker: ^0.8.4+11
  image_cropper: ^1.5.0
  open_file: ^3.2.1
  awesome_notifications: ^0.6.21
  flutter_time_picker_spinner: ^2.0.0
  file_picker: ^4.5.1
  json_annotation: ^4.4.0
  archive: ^3.3.0
  google_sign_in: ^5.3.0
  googleapis: ^8.1.0
  http: ^0.13.4
  permission_handler: ^9.2.0
  connectivity_plus: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^1.1.2
  build_runner: ^2.1.9
  json_serializable: ^6.1.6
  flutter_lints: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/banks_image/
    - assets/fonts/

  fonts:
    - family: Yekan
      fonts:
        - asset: assets/fonts/IRANYekan_Regular.ttf
        - asset: assets/fonts/IRANYekan_Bold.ttf
          weight: 700
        - asset: assets/fonts/IRANYekan_Black.ttf
          weight: 900
